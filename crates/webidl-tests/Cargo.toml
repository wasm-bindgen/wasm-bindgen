[package]
authors = ["The wasm-bindgen Developers"]
edition = "2021"
name = "webidl-tests"
publish = false
version = "0.0.0"

[lib]
doctest = false
path = 'lib.rs'
test = false

[dependencies]
js-sys = { path = '../js-sys', features = ["unsafe-eval"] }
wasm-bindgen = { path = '../..' }
wasm-bindgen-futures = { path = '../futures' }

[build-dependencies]
env_logger = "0.11"
wasm-bindgen-webidl = { path = "../webidl" }

[dev-dependencies]
wasm-bindgen-test = { path = '../test' }

[[test]]
name = 'wasm'
path = 'main.rs'

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(web_sys_unstable_apis)',
  'cfg(wbg_next_unstable)',
] }
# This list is auto-generated by the wasm-bindgen-webidl program
